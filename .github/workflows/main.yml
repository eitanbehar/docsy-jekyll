name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4 # Updated to v4 for security and performance

      # 2. Create target folder (No sudo required)
      - name: Create target folder
        run: mkdir -p ./_site

      # 3. Build site using the pre-installed Docker Compose V2
      # Note: Adjust if your compose file requires a specific service to exit
      - name: Build site with docker compose
        run: docker compose up --build

      # 4. Debugging: Check the contents of the generated site
      - name: Take a look at site content -- recursive
        run: ls -R ./_site
        
      # 5. Debugging: Check container states
      - name: Find running containers
        run: docker ps -a
        
      # 6. Deploy to FTP
      - name: Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5 # Pin to a stable v4 patch
        with:
          server: baconao.net
          username: posts@baconao.net
          password: ${{ secrets.ftp_password }}
          local-dir: ./_site/
          server-dir: ./
          state-name: ../sync.json
